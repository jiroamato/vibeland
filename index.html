<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Voxel Sandbox</title>
    <style>
      :root {
        --hotbar-slot: 48px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #87aef0; }
      body { font-family: "Segoe UI", system-ui, sans-serif; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; }

      /* ---- HUD ---- */
      #hud { position: fixed; inset: 0; pointer-events: none; user-select: none; z-index: 10; }

      /* Crosshair */
      #crosshair {
        position: absolute; left: 50%; top: 50%;
        width: 20px; height: 20px; transform: translate(-50%, -50%);
        opacity: 0.85;
        background:
          linear-gradient(#fff, #fff) center/2px 100% no-repeat,
          linear-gradient(#fff, #fff) center/100% 2px no-repeat;
        mix-blend-mode: difference;
      }

      /* Hotbar */
      #hotbar {
        position: absolute; left: 50%; bottom: 14px; transform: translateX(-50%);
        display: flex; gap: 0;
        padding: 3px;
        background: rgba(0, 0, 0, 0.35);
        border: 2px solid #2b2b2b;
        border-radius: 2px;
        image-rendering: pixelated;
      }
      .slot {
        position: relative;
        width: var(--hotbar-slot); height: var(--hotbar-slot);
        background: #8b8b8b;
        border: 2px solid;
        border-color: #373737 #ffffff #ffffff #373737;
        display: flex; align-items: center; justify-content: center;
      }
      .slot canvas { width: 80%; height: 80%; image-rendering: pixelated; }
      .slot.selected { outline: 3px solid #ffffff; outline-offset: 1px; z-index: 2; }
      .slot .num {
        position: absolute; top: 1px; left: 3px;
        font-size: 11px; color: #fff; text-shadow: 1px 1px 0 #3f3f3f;
      }

      /* Debug overlay (F3) */
      #debug {
        position: absolute; top: 6px; left: 6px;
        font-family: "Consolas", "Courier New", monospace;
        font-size: 13px; line-height: 1.45;
        color: #fff; text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
        white-space: pre; display: none;
      }
      #debug.visible { display: block; }

      /* Start / pointer-lock prompt */
      #overlay {
        position: fixed; inset: 0; z-index: 20;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(10, 20, 40, 0.55); color: #fff; text-align: center;
        backdrop-filter: blur(2px);
      }
      #overlay.hidden { display: none; }
      #overlay h1 { font-size: 34px; letter-spacing: 1px; margin-bottom: 8px; text-shadow: 2px 2px 0 #000; }
      #overlay p { font-size: 15px; opacity: 0.9; margin: 3px 0; max-width: 560px; line-height: 1.5; }
      #overlay .play {
        margin-top: 18px; padding: 12px 30px; font-size: 18px; cursor: pointer;
        background: #6aab3a; color: #fff; border: 2px solid #000; border-radius: 3px;
        text-shadow: 1px 1px 0 #2f5018; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.25);
        pointer-events: auto;
      }
      #overlay .play:hover { background: #79c043; }
      #overlay .controls { margin-top: 22px; font-size: 13px; opacity: 0.85; }
      #overlay .pack { margin-top: 14px; font-size: 13px; pointer-events: auto; }
      #overlay .pack input { display: none; }
      #overlay .pack label { color: #9fd; cursor: pointer; text-decoration: underline; }
      #loading { position: fixed; inset: 0; z-index: 30; display: flex; align-items: center;
        justify-content: center; background: #87aef0; color: #fff; font-size: 20px; }
      #loading.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="app"></div>

    <div id="hud">
      <div id="crosshair"></div>
      <div id="debug"></div>
      <div id="hotbar"></div>
    </div>

    <div id="loading">Generating world…</div>

    <div id="overlay" class="hidden">
      <h1>VOXEL SANDBOX</h1>
      <p>A from-scratch Minecraft-style voxel game.</p>
      <button class="play" id="play">Click to Play</button>
      <div class="controls">
        WASD move · Space jump · Shift sneak · Ctrl / double-tap W sprint · F fly<br />
        Left-click break · Right-click place · 1–9 / scroll select · F3 debug · Esc release mouse
      </div>
      <div class="pack">
        <input type="file" id="packInput" webkitdirectory directory multiple />
        <label for="packInput">Load a resource pack folder…</label>
        <span id="packStatus" style="opacity:0.7"></span>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
